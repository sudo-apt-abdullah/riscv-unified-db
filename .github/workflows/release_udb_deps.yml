name: Build and release UDB gem dependencies to GitHub

# Builds and uploads prebuilt eqntott, espresso, must, and/or z3 binaries as GitHub release assets.
# Run this workflow manually whenever a tool version needs to be updated.
#
# The workflow automatically creates release tags and uploads binaries for the selected tool(s).
# Each tool uses the chore update command which handles tag creation and release management.

on:
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool to build"
        required: true
        type: choice
        options:
          - eqntott
          - espresso
          - must
          - z3
          - all
      force:
        description: "Force rebuild and release even if release already exists"
        required: false
        type: boolean
        default: false

env:
  GITHUB_TOKEN: ${{ secrets.TOKEN }}

jobs:
  build-eqntott:
    if: inputs.tool == 'eqntott' || inputs.tool == 'all'
    name: Build Eqntott (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and upload Eqntott for ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            ./bin/chore update eqntott -n -f
          else
            ./bin/chore update eqntott -n
          fi

  build-z3:
    if: inputs.tool == 'z3' || inputs.tool == 'all'
    name: Build Z3 (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and upload Z3 for ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            ./bin/chore update z3 -n -f
          else
            ./bin/chore update z3 -n
          fi

  build-espresso:
    if: inputs.tool == 'espresso' || inputs.tool == 'all'
    name: Build Espresso (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and upload Espresso for ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            ./bin/chore update espresso -n -f
          else
            ./bin/chore update espresso -n
          fi

  build-must:
    if: inputs.tool == 'must' || inputs.tool == 'all'
    name: Build Must (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and upload Must for ${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            ./bin/chore update must -n -f
          else
            ./bin/chore update must -n
          fi
