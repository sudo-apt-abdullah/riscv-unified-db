    description: "All comparison operators in one expression"
    category: "Edge Cases"
    test_type: expression
    idl: "(4'h5 > 4'h3) && (4'h2 < 4'h4) && (4'h1 <= 4'h2) && (4'h3 >= 4'h3) && (4'h1 == 4'h1) && (4'h2 != 4'h3)"
    expected_type:
      kind: boolean
    should_pass: true

  - name: widening_operators_chained
    description: "Multiple widening operators chained"
    category: "Edge Cases"
    test_type: expression
    idl: "4'hF `+ 4'h1 `+ 4'h1"
    expected_type:
      kind: bits
      width: 6
    should_pass: true

  - name: concatenation_with_single_bits
    description: "Concatenation of many single bits"
    category: "Edge Cases"
    test_type: expression
    idl: "{1'b1, 1'b0, 1'b1, 1'b0, 1'b1, 1'b0, 1'b1, 1'b0}"
    expected_type:
      kind: bits
      width: 8
    should_pass: true

  - name: nested_bit_extraction
    description: "Nested bit extraction operations"
    category: "Edge Cases"
    test_type: expression
    idl: "16'hABCD[15:8][7:4]"
    expected_type:
      kind: bits
      width: 4
    should_pass: true

