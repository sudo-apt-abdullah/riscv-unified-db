      width: 4
      signed: false
    should_pass: true

  - name: mixed_operators
    description: "Mix of arithmetic and bitwise operators"
    category: "Complex Expressions"
    test_type: expression
    idl: "(8'hFF & 8'h0F) + 8'h01"
    expected_type:
      kind: bits
      width: 8
      signed: false
    should_pass: true

  - name: comparison_in_ternary
    description: "Comparison as ternary condition"
    category: "Complex Expressions"
    test_type: expression
    idl: "(4'h5 > 4'h3) ? 8'hFF : 8'h00"
    expected_type:
