      width: 8
      signed: false
    should_pass: true

  - name: nested_ternary
    description: "Nested ternary expressions"
    category: "Complex Expressions"
    test_type: expression
    idl: "true ? (false ? 4'h1 : 4'h2) : 4'h3"
    expected_type:
      kind: bits
      width: 4
      signed: false
    should_pass: true

  - name: chained_comparisons
    description: "Chained comparison with logical operators"
    category: "Complex Expressions"
    test_type: expression
    idl: "(4'h5 > 4'h3) && (4'h2 < 4'h4)"
    expected_type:
      kind: boolean
    should_pass: true

