    test_type: expression
    idl: "256'd1"
    expected_type:
      kind: bits
      width: 256
    should_pass: true

  - name: single_bit_all_operations
    description: "All operations on single bit"
    category: "Edge Cases"
    test_type: expression
    idl: "(1'b1 & 1'b1) | (1'b0 ^ 1'b1)"
    expected_type:
      kind: bits
      width: 1
    should_pass: true

  - name: nested_parentheses_deep
    description: "Deeply nested parentheses"
    category: "Edge Cases"
    test_type: expression
    idl: "((((4'hF))))"
    expected_type:
      kind: bits
      width: 4
    should_pass: true

  - name: chained_ternary_operators
    description: "Multiple chained ternary operators"
    category: "Edge Cases"
    test_type: expression
    idl: "true ? 4'h1 : false ? 4'h2 : true ? 4'h3 : 4'h4"
    expected_type:
      kind: bits
      width: 4
    should_pass: true

  - name: mixed_signed_unsigned_complex
    description: "Complex expression with mixed signedness"
    category: "Edge Cases"
    test_type: expression
    idl: "(4'sd7 + 4'd1) * (4'sd2 - 4'd1)"
    expected_type:
      kind: bits
      width: 4
      signed: false
    should_pass: true

