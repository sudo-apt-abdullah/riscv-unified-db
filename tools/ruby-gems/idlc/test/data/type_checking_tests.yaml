    should_pass: true

  - name: comparison_greater_equal
    description: "Greater or equal returns Boolean"
    category: "Operators"
    test_type: expression
    idl: "4'h5 >= 4'h3"
    expected_type:
      kind: boolean
    should_pass: true

  - name: comparison_less_equal
    description: "Less or equal returns Boolean"
    category: "Operators"
    test_type: expression
    idl: "4'h3 <= 4'h5"
    expected_type:
      kind: boolean
    should_pass: true

