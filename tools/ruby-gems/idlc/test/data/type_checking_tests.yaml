# Type Checking Test Data
# This file contains test cases for the IDL type checking system
# Organized by documentation sections from doc/idl.adoc

# ============================================================================
# Primitive Types - Bits<N>
# ============================================================================
primitive_types_bits:
  - name: bits_literal_32
    description: "32-bit literal"
    category: "Primitive Types"
    test_type: expression
    idl: "32'd0"
    expected_type:
      kind: bits
      width: 32
    should_pass: true

  - name: bits_literal_64
    description: "64-bit literal"
    category: "Primitive Types"
    test_type: expression
    idl: "64'd0"
    expected_type:
      kind: bits
      width: 64
    should_pass: true

  - name: bits_literal_8
    description: "8-bit literal"
    category: "Primitive Types"
    test_type: expression
    idl: "8'hFF"
    expected_type:
      kind: bits
      width: 8
    should_pass: true

  - name: bits_literal_no_width_decimal
    description: "Verilog-style literal without width defaults to MXLEN"
    category: "Primitive Types"
    test_type: expression
    idl: "'d13"
    expected_type:
      kind: bits
      width: null # MXLEN is configuration-dependent
      max_width: 64 # MXLEN maximum is 64 bits
    should_pass: true

  - name: bits_literal_no_width_hex
    description: "Verilog-style hex literal without width defaults to MXLEN"
    category: "Primitive Types"
    test_type: expression
    idl: "'hFF"
    expected_type:
      kind: bits
      width: null # MXLEN is configuration-dependent
      max_width: 64 # MXLEN maximum is 64 bits
    should_pass: true

  - name: bits_literal_c_style_decimal
    description: "C-style decimal literal sized to fit"
    category: "Primitive Types"
    test_type: expression
    idl: "13"
    expected_type:
      kind: bits
      width: 4 # minimum bits to represent 13
    should_pass: true

  - name: bits_literal_c_style_hex
    description: "C-style hex literal sized to fit"
    category: "Primitive Types"
    test_type: expression
    idl: "0xd"
    expected_type:
      kind: bits
      width: 4 # minimum bits to represent 0xd (13)
    should_pass: true

  - name: bits_literal_c_style_octal
    description: "C-style octal literal sized to fit"
    category: "Primitive Types"
    test_type: expression
    idl: "015"
    expected_type:
      kind: bits
      width: 4 # minimum bits to represent 015 (13)
    should_pass: true

  - name: bits_literal_c_style_binary
    description: "C-style binary literal sized to fit"
    category: "Primitive Types"
    test_type: expression
    idl: "0b1101"
    expected_type:
      kind: bits
      width: 4 # minimum bits to represent 0b1101 (13)
    should_pass: true

  - name: bits_literal_c_style_signed
    description: "C-style signed literal sized to fit"
    category: "Primitive Types"
    test_type: expression
    idl: "-13s"
    expected_type:
      kind: bits
      width: 4 # 4 bits for signed -13 (13s is the literal, then negated)
      signed: true
    should_pass: true

  - name: bits_literal_c_style_signed_hex
    description: "C-style signed hex literal"
    category: "Primitive Types"
    test_type: expression
    idl: "-0xds"
    expected_type:
      kind: bits
      width: 5 # 5 bits for signed -0xd (0xd needs 4 bits, signed needs +1)
      signed: true
    should_pass: true

  - name: bits_literal_c_style_zero
    description: "C-style zero is specially 1-bit wide"
    category: "Primitive Types"
    test_type: expression
    idl: "0"
    expected_type:
      kind: bits
      width: 1 # 0 is specially defined to be 1-bit wide
    should_pass: true

  - name: bits_literal_c_style_large
    description: "C-style large literal sized appropriately"
    category: "Primitive Types"
    test_type: expression
    idl: "0xfff"
    expected_type:
      kind: bits
      width: 12 # minimum bits to represent 0xfff (4095)
    should_pass: true

# ============================================================================
# Primitive Types - Boolean
# ============================================================================
primitive_types_boolean_true:
  - name: boolean_literal_true
    description: "Boolean literal true"
    category: "Primitive Types"
    test_type: expression
    idl: "true"
    expected_type:
      kind: boolean
    should_pass: true

primitive_types_boolean_false:
  - name: boolean_literal_false
    description: "Boolean literal false"
    category: "Primitive Types"
    test_type: expression
    idl: "false"
    expected_type:
      kind: boolean
    should_pass: true

# ============================================================================
# Binary Operators
# ============================================================================
operators_binary:
  - name: binary_add_width_extension
    description: "Binary operator extends to larger width"
    category: "Operators"
    test_type: expression
    idl: "4'hF + 8'h01"
    expected_type:
      kind: bits
      width: 8
      signed: false
    should_pass: true

  - name: binary_subtract_width_extension
    description: "Subtraction extends to larger width"
    category: "Operators"
    test_type: expression
    idl: "8'hFF - 4'h1"
    expected_type:
      kind: bits
      width: 8
      signed: false
    should_pass: true

