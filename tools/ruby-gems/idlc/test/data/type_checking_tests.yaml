# ============================================================================
# Widening Operators
# ============================================================================
operators_widening:
  - name: widening_multiply
    description: "Widening multiply adds widths"
    category: "Operators"
    test_type: expression
    idl: "4'hF `* 4'hF"
    expected_type:
      kind: bits
      width: 8
    should_pass: true

  - name: widening_add
    description: "Widening add increases width by 1"
    category: "Operators"
    test_type: expression
    idl: "4'hF `+ 4'h1"
    expected_type:
      kind: bits
      width: 5
    should_pass: true

  - name: widening_left_shift
    description: "Widening left shift adds shift amount to width"
    category: "Operators"
    test_type: expression
    idl: "4'hF `<< 2"
    expected_type:
      kind: bits
      width: 6
    should_pass: true

# ============================================================================
# Bit Extraction
# ============================================================================
operators_bit_extraction:
  - name: single_bit_extraction
    description: "Single bit extraction returns Bits<1>"
    category: "Operators"
    test_type: expression
    idl: "8'hFF[3]"
    expected_type:
      kind: bits
      width: 1
      signed: false
    should_pass: true

  - name: range_extraction
    description: "Range extraction returns correct width"
    category: "Operators"
    test_type: expression
    idl: "8'hFF[7:4]"
    expected_type:
      kind: bits
      width: 4
      signed: false
    should_pass: true

# ============================================================================
# Concatenation and Replication
# ============================================================================
operators_concatenation:
  - name: concatenation
    description: "Concatenation sums widths"
    category: "Operators"
    test_type: expression
    idl: "{4'hF, 4'h0}"
    expected_type:
      kind: bits
      width: 8
      signed: false
    should_pass: true

  - name: replication
    description: "Replication multiplies width"
    category: "Operators"
    test_type: expression
    idl: "{4{2'b10}}"
    expected_type:
      kind: bits
      width: 8
      signed: false
    should_pass: true

# ============================================================================
# Casting - $signed
# ============================================================================
casting_signed:
  - name: signed_cast
    description: "$signed cast changes signedness"
    category: "Casting"
    test_type: expression
    idl: "$signed(4'b1111)"
    expected_type:
      kind: bits
      width: 4
      signed: true
    should_pass: true

# ============================================================================
