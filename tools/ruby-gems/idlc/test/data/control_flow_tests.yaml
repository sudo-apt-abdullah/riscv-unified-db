# Control Flow Type Checking Test Data
# This file contains test cases for control flow constructs (if/else, for loops, etc.)
# These tests require full IDL code blocks with proper context

# ============================================================================
# If/Else Statements
# ============================================================================
if_statements:
  - name: if_statement_basic
    description: "Basic if statement with Boolean condition"
    category: "Control Flow"
    context: body
    idl: |
      if (true) {
        Bits<8> x = 8'hFF;
      }
    should_pass: true

  - name: if_else_statement
    description: "If-else statement with Boolean condition"
    category: "Control Flow"
    context: body
    idl: |
      if (4'h5 > 4'h3) {
        Bits<8> x = 8'hFF;
      } else {
        Bits<8> x = 8'h00;
      }
    should_pass: true

  - name: if_elsif_else_statement
    description: "If-elsif-else chain"
    category: "Control Flow"
    context: body
    idl: |
      if (4'h5 > 4'h3) {
        Bits<8> x = 8'hFF;
      } else if (4'h2 < 4'h4) {
        Bits<8> x = 8'h0F;
      } else {
        Bits<8> x = 8'h00;
      }
    should_pass: true

  - name: nested_if_statements
    description: "Nested if statements"
    category: "Control Flow"
    context: body
    idl: |
      if (true) {
        if (false) {
          Bits<8> x = 8'hFF;
        }
      }
    should_pass: true

# ============================================================================
# If Statement Errors
# ============================================================================
if_statement_errors:
  - name: if_condition_not_boolean
    description: "If condition must be Boolean, not Bits"
    category: "Control Flow Errors"
    context: body
    idl: |
      if (8'hFF) {
        Bits<8> x = 8'h00;
      }
    expected_error: "Idl::AstNode::TypeError"
    should_pass: false

  - name: if_condition_integer
    description: "If condition must be Boolean, not integer"
    category: "Control Flow Errors"
    context: body
    idl: |
      if (1) {
        Bits<8> x = 8'h00;
      }
    expected_error: "Idl::AstNode::TypeError"
    should_pass: false

# ============================================================================
# For Loops
# ============================================================================
for_loops:
  - name: for_loop_basic
    description: "Basic for loop with range"
    category: "Control Flow"
    context: body
    idl: |
      for (U32 i=0; i<10; i=i+1) {
        Bits<8> x = 8'hFF;
      }
    should_pass: true

  - name: for_loop_with_computation
    description: "For loop with computation in body"
    category: "Control Flow"
    context: body
    idl: |
      Bits<32> sum = 32'd0;
      for (U32 i=0; i<10; i=i+1) {
        sum = sum + 32'd1;
      }
    should_pass: true

# ============================================================================
# Variable Declarations and Assignments
# ============================================================================
variable_operations:
  - name: variable_declaration_and_assignment
    description: "Declare variable then assign to it"
    category: "Variables"
    context: body
    idl: |
      Bits<8> x;
      x = 8'hFF;
    should_pass: true

  - name: multiple_variable_declarations
    description: "Multiple variable declarations"
    category: "Variables"
    context: body
    idl: |
      Bits<8> x = 8'hFF;
      Bits<8> y = 8'h00;
      Bits<8> z = x + y;
    should_pass: true

  - name: variable_reassignment
    description: "Reassign variable with new value"
    category: "Variables"
    context: body
    idl: |
      Bits<8> x = 8'hFF;
      x = 8'h00;
    should_pass: true

# ============================================================================
# Variable Assignment Errors
# ============================================================================
variable_errors:
  - name: assign_wrong_type
    description: "Cannot assign Boolean to Bits variable"
    category: "Variable Errors"
    context: body
    idl: |
      Bits<8> x = 8'hFF;
      x = true;
    expected_error: "Idl::AstNode::TypeError"
    should_pass: false

# ============================================================================
# Return Statements
# ============================================================================
return_statements:
  - name: return_statement_basic
    description: "Basic return statement"
    category: "Return Statements"
    context: root
    idl: |
      function get_value {
        returns Bits<8>
        description { descriptive }
        body {
          return 8'hFF;
        }
      }
    should_pass: true

  - name: conditional_return
    description: "Conditional return statement"
    category: "Return Statements"
    context: root
    idl: |
      function get_value {
        returns Bits<8>
        arguments Boolean flag
        description { descriptive }
        body {
          if (flag) {
            return 8'hFF;
          } else {
            return 8'h00;
          }
          }
      }
    should_pass: true

# ============================================================================
# Function Definitions
# ============================================================================
function_definitions:
  - name: function_with_parameters
    description: "Function with parameters"
    category: "Functions"
    context: root
    idl: |
      function add_values {
        returns Bits<8>
        arguments Bits<8> a, Bits<8> b
        description { descriptive }
        body {
          return a + b;
        }
      }
    should_pass: true

  - name: function_with_local_variables
    description: "Function with local variables"
    category: "Functions"
    context: root
    idl: |
      function compute {
        returns Bits<8>
        description { descriptive }
        body {
          Bits<8> x = 8'hFF;
          Bits<8> y = 8'h0F;
          return x & y;
        }
      }
    should_pass: true

# ============================================================================
# Enum Definitions
# ============================================================================
enum_definitions:
  - name: enum_definition_basic
    description: "Basic enum definition"
    category: "Enums"
    context: root
    idl: |
      enum PrivilegeMode {
        User 0
        Supervisor 1
        Machine 3
      }
    should_pass: true

# ============================================================================
# Bitfield Definitions
# ============================================================================
bitfield_definitions:
  - name: bitfield_definition_basic
    description: "Basic bitfield definition"
    category: "Bitfields"
    context: root
    idl: |
      bitfield (64) Mstatus {
        SD   63
        MBE  37
        SBE  36
        SXL  35-34
        UXL  33-32
        TSR  22
        TW   21
        TVM  20
        MXR  19
        SUM  18
        MPRV 17
      }
    should_pass: true
